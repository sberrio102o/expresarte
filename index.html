<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formal try</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body">
    <header class="navegacion">
        <ul class="navegacion logomain">
        <img src="img/valorant.png" alt="Logo de Valorant" class="logo">
        <h1 style="color: white;"><i>Expresarte</i></h1>
        </ul>
    </header>
        <ul class="navegacion">
            <li><button onclick="mostrarTab('tabla1')" class="buttons">Brand identitty</button></li>
            <li><button onclick="mostrarTab('tabla2')" class="buttons">Printed</button></li>
            <li><button onclick="mostrarTab('tabla3')" class="buttons">Digital design</button></li>
            <li><button onclick="mostrarTab('tabla3')" class="buttons">Printed and graphic production</button></li>
            <li><button onclick="mostrarTab('tabla3')" class="buttons">Editorial design</button></li>
        </ul>
    <div id="tabla1" class="contenido-tab">
        <h3>Tabla Uno</h3>
        <table border="1">
            <tr><th>Encabezado 1</th><th>Encabezado 2</th></tr>
            <tr><td>Dato 1</td><td>Dato 2</td></tr>
        </table>
    </div>
    <div id="tabla2" class="contenido-tab" style="display:none;">
        <h3>Tabla Dos</h3>
        <table border="1">
            <tr><th>Producto</th><th>Precio</th></tr>
            <tr><td>Manzanas</td><td>$1.00</td></tr>
        </table>
    </div>
    <script>
        function mostrarTab(idTab) {
            let contenidos = document.getElementsByClassName("contenido-tab");
            for (let i = 0; i < contenidos.length; i++) {
                contenidos[i].style.display = "none";
            }
            document.getElementById(idTab).style.display = "block";
        }
    </script>
</body>
</html>
